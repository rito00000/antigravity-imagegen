<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Prompt Maker (PixAI)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">

        <div id="main-view" class="view active">
            <header class="app-header">
                <div class="header-left">
                    <h1>✨ プロンプトメーカー v20260323_r2</h1>
                </div>
                <div class="header-right">
                    <button id="btn-global-settings" class="icon-btn" title="全体設定">⚙️</button>
                </div>
            </header>

            <div class="content-area padding-area" style="padding-bottom: 80px;">

                <div class="setting-block">
                    <h3>共通設定</h3>
                    <button class="select-btn" data-type="quality">品質を選択...</button>
                    <button class="select-btn" data-type="style">画風を選択...</button>
                    <button class="select-btn" data-type="scene">シーンを選択...</button>
                    <button class="select-btn" data-type="pose">ポーズを選択...</button>
                </div>

				<div id="character-blocks-container">
                    <div class="setting-block char-block" data-index="1">
                        <h3>👤 キャラ 1</h3>
                        <button class="select-btn" data-type="character" data-charidx="0">キャラ設定を選択...</button>
                        <button class="select-btn" data-type="clothing" data-charidx="0">服装を選択...</button>
                    </div>
                </div>

                <button id="btn-add-char" class="secondary-btn full-width margin-top">＋ キャラを追加</button>

                <label style="margin-top: 24px;">構築されたプロンプト (ポジティブ / 編集可能)</label>
                <textarea id="combined-prompt-preview" rows="5" placeholder="ポジティブな設定がここに結合されます..."></textarea>

                <label style="margin-top: 16px;">構築されたプロンプト (ネガティブ / 編集可能)</label>
                <textarea id="combined-negative-preview" rows="3" placeholder="ネガティブな設定がここに結合されます..."></textarea>

                <div style="display: flex; gap: 8px; margin-top: 12px;">
                    <button id="btn-reset-prompt" class="secondary-btn" style="flex: 1;">リセット</button>
                    <button id="btn-generate-english" class="primary-btn" style="flex: 2;">✨ 英語タグに変換 (AI)</button>
                </div>

                <!-- ★作業用テキストフィールド (作業用メモ) ★ -->
                <div id="memo-area" style="margin-top: 24px;">
                    <label>作業用テキストフィールド (内容保持)</label>
                    <textarea id="memo-input" rows="5" placeholder="自由に入力・編集ができる作業場だ。画面を切り替えても内容は残るぞ。"></textarea>
                    <div style="display: flex; gap: 8px; margin-top: 8px;">
                        <button id="btn-copy-memo" class="secondary-btn" style="flex: 1;">📋 コピー</button>
                        <button id="btn-reset-memo" class="secondary-btn" style="flex: 1; color: var(--danger-color);">♻️ 内容リセット</button>
                    </div>
                </div>

                <div id="english-output-area" style="display: none; margin-top: 24px;">
                    <label>出力された英語タグ (ポジティブ / PixAI用)</label>
                    <div class="prompt-output-box">
                        <textarea id="english-prompt-output" class="prompt-output-text" rows="5" style="background: transparent; border: none; outline: none; resize: vertical; color: inherit; font-family: inherit;"></textarea>
                        <button id="btn-copy-english" class="icon-btn copy-btn" title="コピー">📋</button>
                    </div>

                    <label style="margin-top: 16px;">出力された英語タグ (ネガティブ / PixAI用)</label>
                    <div class="prompt-output-box">
                        <textarea id="english-negative-output" class="prompt-output-text" rows="3" style="background: transparent; border: none; outline: none; resize: vertical; color: inherit; font-family: inherit;"></textarea>
                        <button id="btn-copy-negative" class="icon-btn copy-btn" title="コピー">📋</button>
                    </div>
                    <div style="margin-top: 16px;">
                        <label>履歴のタイトル (編集可能)</label>
                        <input type="text" id="history-title-input" placeholder="AIが案を出します...">
                    </div>
                    <button id="btn-add-to-history" class="primary-btn full-width margin-top">💾 履歴に追加</button>
                </div>
            </div>

            <nav class="bottom-nav">
                <button class="nav-item" data-target="quality">品質</button>
                <button class="nav-item" data-target="style">画風</button>
                <button class="nav-item" data-target="character">キャラ</button>
                <button class="nav-item" data-target="clothing">服装</button>
                <button class="nav-item" data-target="scene">シーン</button>
                <button class="nav-item" data-target="pose">ポーズ</button>
                <button class="nav-item" data-target="history">履歴</button>
            </nav>
        </div>

        <div id="manage-view" class="view">
            <header class="app-header">
                <div class="header-left">
                    <button id="btn-back-from-manage" class="icon-btn">◀</button>
                    <h1 id="manage-header-title">設定管理</h1>
                </div>
                <div class="header-right">
                    <button id="btn-clear-history" class="text-btn danger-color" style="display:none; font-size:0.8rem; font-weight:600;">全削除</button>
                </div>
            </header>
            <div class="content-area padding-area">
                <ul id="manage-item-list" class="item-list">
                    </ul>
                <button id="btn-add-item" class="primary-btn floating-btn" style="bottom: 24px;">+</button>
            </div>
        </div>

        <div id="edit-modal" class="view modal-view">
            <header class="app-header modal-header">
                <h2 id="edit-modal-title">項目の編集</h2>
                <button id="btn-close-edit" class="icon-btn">✖</button>
            </header>
            <div class="content-area padding-area">
                <label>タイトル</label>
                <input type="text" id="edit-title" placeholder="例：最高品質、銀髪ツインテ...">

                <div id="field-prompt" class="edit-field-group">
                    <label id="label-prompt">プロンプト</label>
                    <textarea id="edit-prompt" rows="3"></textarea>
                </div>
                
                <div id="field-char-base" class="edit-field-group" style="display: none;">
                    <label>キャラ素体の基本設定</label>
                    <textarea id="edit-char-base" rows="3"></textarea>
                    <label>キャラの基本衣装</label>
                    <textarea id="edit-char-clothes" rows="3"></textarea>
                </div>

                <div id="field-negative" class="edit-field-group">
                    <label>ネガティブプロンプト</label>
                    <textarea id="edit-negative" rows="3"></textarea>
                </div>

                <div class="layout-row margin-top">
                    <button id="btn-save-item" class="primary-btn">保存</button>
                    <button id="btn-delete-item" class="danger-btn" style="display: none;">削除</button>
                </div>
            </div>
        </div>

        <div id="selection-modal" class="view modal-view" style="background-color: rgba(0,0,0,0.85);">
            <header class="app-header modal-header" style="background: var(--surface-color);">
                <h2 id="selection-modal-title">選択してください</h2>
                <button id="btn-close-selection" class="icon-btn">✖</button>
            </header>
            <div class="content-area padding-area">
                <ul id="selection-list" class="item-list">
                    </ul>
                <button id="btn-clear-selection" class="secondary-btn full-width margin-top">選択を解除する</button>
            </div>
        </div>

        <div id="global-settings-view" class="view modal-view">
            <header class="app-header modal-header">
                <h2>アプリ全体設定</h2>
                <button id="btn-close-global-settings" class="icon-btn">✖</button>
            </header>
            <div class="content-area padding-area">
                <label for="api-key-input">Gemini APIキー (翻訳用)</label>
                <input type="password" id="api-key-input" placeholder="AIzaSy...">
                <p class="help-text">入力された日本語をPixAI用のDanbooruタグに変換するために使用します。ブラウザ内にのみ保存されます。</p>

                <label style="margin-top: 24px;">使用するAIモデル</label>
                <div class="radio-group" style="padding-bottom:16px; flex-direction: column;">
                    <label>
                        <input type="radio" name="modelType" value="select" checked> リストから選択
                    </label>
                    <select id="model-select" style="margin-left:24px; width:calc(100% - 24px); box-sizing:border-box; background-color: var(--surface-color); color: var(--text-primary); border: 1px solid var(--border-color); padding: 10px 12px; border-radius: 8px; font-size: 1rem; font-family: inherit;">
                        <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite Preview (デフォルト)</option>
                        <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
                    </select>
                    <label style="margin-top:10px;">
                        <input type="radio" name="modelType" value="custom"> 自由入力
                    </label>
                    <input type="text" id="model-input" placeholder="モデル名を入力..." style="margin-left:24px; width:calc(100% - 24px); box-sizing:border-box; background-color: var(--surface-color); color: var(--text-primary); border: 1px solid var(--border-color); padding: 10px 12px; border-radius: 8px; font-size: 1rem; font-family: inherit;" disabled>
                </div>

                <button id="btn-save-global" class="primary-btn full-width margin-top">保存して戻る</button>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
